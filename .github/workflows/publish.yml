name: Build & Publish to PyPI

# Trigger on GitHub releases or manually
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (yes/no)"
        required: true
        default: "no"

jobs:
  # ──────────────────────────────────────────────
  # Build compiled wheels for every platform
  # ──────────────────────────────────────────────
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.22.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Build for Python 3.10-3.13
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"

          # Skip 32-bit builds, musl Linux, and PyPy
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_* pp*"

          # macOS: build both Intel and Apple Silicon
          CIBW_ARCHS_MACOS: "x86_64 arm64"

          # Linux: x86_64 only (add aarch64 later if needed)
          CIBW_ARCHS_LINUX: "x86_64"

          # Windows: 64-bit only
          CIBW_ARCHS_WINDOWS: "AMD64"

          # Install Cython before building
          CIBW_BEFORE_BUILD: "pip install Cython>=3.0"

          # Test that the compiled wheel actually imports
          CIBW_TEST_COMMAND: >
            python -c "import agentqa; print(f'AgentQA {agentqa.__version__} loaded OK')"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ──────────────────────────────────────────────
  # Publish all wheels to PyPI
  # ──────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    # Only publish on release events, or manual trigger with publish=yes
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'yes')
    # id-token: PyPI trusted publishing (OIDC).
    # actions: read — required to download artifacts from this run (any scope omitted
    #   when you set `permissions` defaults to none and breaks download-artifact).
    # contents: read — safe default for GITHUB_TOKEN.
    permissions:
      id-token: write
      actions: read
      contents: read

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: List wheels to publish
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
